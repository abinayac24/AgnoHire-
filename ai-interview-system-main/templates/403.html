<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 Unauthorized</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#f8fafc;font-family:"Segoe UI",Tahoma,sans-serif;}
    .card{max-width:520px;padding:28px;border-radius:18px;background:#111827;border:1px solid rgba(148,163,184,.2);text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.28);}
    h1{margin:0 0 10px;font-size:40px;}
    p{color:#cbd5e1;line-height:1.7;}
    a{display:inline-block;margin-top:16px;padding:10px 14px;border-radius:10px;background:#2563eb;color:#fff;text-decoration:none;font-weight:700;}
  </style>
</head>
<body>
  <div class="card">
    <h1>403</h1>
    <p>You are not authorized to access the admin portal. Candidate users can attend interviews, but only admin accounts can view reports and analytics.</p>
    <a href="/">Return Home</a>
  </div>
</body>
</html>
