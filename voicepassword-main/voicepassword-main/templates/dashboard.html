<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceAccess — Dashboard</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0f1a;min-height:100vh;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;color:#fff;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
    nav{position:relative;z-index:10;background:rgba(13,15,26,0.85);backdrop-filter:blur(12px);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2235;}
    .nav-logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none;}
    .nav-logo-icon{position:relative;width:38px;height:38px;display:flex;align-items:center;justify-content:center;}
    .nav-ring{position:absolute;inset:0;border-radius:50%;border:1.5px dashed rgba(0,229,255,0.4);animation:spin 12s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .nav-logo h1{font-size:1.2rem;font-weight:700;color:#ecf0f1;}
    .nav-logo h1 span{color:#00e5ff;}
    .nav-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:999px;font-family:'Space Mono',monospace;font-size:0.68rem;color:#10b981;letter-spacing:0.08em;}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
    .btn-logout{display:flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;background:transparent;border:1px solid #1e2235;border-radius:8px;color:#6b7280;font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all 0.2s;}
    .btn-logout:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.06);}
    main{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;}
    .card{background:#151829;border:1px solid #1e2235;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:460px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.6);animation:fadeUp 0.5s ease both;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .icon-wrap{position:relative;width:90px;height:90px;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;}
    .icon-ring1{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,229,255,0.15);}
    .icon-ring2{position:absolute;inset:10px;border-radius:50%;border:1.5px solid rgba(0,229,255,0.25);}
    .icon-circle{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,184,204,0.1));border:1px solid rgba(0,229,255,0.3);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(0,229,255,0.2);}
    .icon-circle svg{width:26px;height:26px;stroke:#00e5ff;fill:none;}
    .auth-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.35rem 0.9rem;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:999px;font-family:'Space Mono',monospace;font-size:0.7rem;color:#10b981;letter-spacing:0.08em;margin-bottom:1.25rem;}
    .auth-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:blink 2s infinite;}
    .welcome-label{font-family:'Space Mono',monospace;font-size:0.78rem;color:#6b7280;margin-bottom:0.4rem;letter-spacing:0.05em;}
    .username{font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:1rem;}
    .username span{background:linear-gradient(90deg,#00e5ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin-bottom:1.5rem;}
    .wbar{width:3px;border-radius:2px;background:#00e5ff;opacity:0.5;animation:wave 1.4s ease-in-out infinite;}
    .wbar:nth-child(1){height:8px;animation-delay:0s;}.wbar:nth-child(2){height:14px;animation-delay:0.1s;}.wbar:nth-child(3){height:22px;animation-delay:0.2s;}.wbar:nth-child(4){height:28px;animation-delay:0.3s;}.wbar:nth-child(5){height:32px;animation-delay:0.4s;}.wbar:nth-child(6){height:28px;animation-delay:0.3s;}.wbar:nth-child(7){height:22px;animation-delay:0.2s;}.wbar:nth-child(8){height:14px;animation-delay:0.1s;}.wbar:nth-child(9){height:8px;animation-delay:0s;}
    @keyframes wave{0%,100%{transform:scaleY(0.5);opacity:0.3;}50%{transform:scaleY(1);opacity:0.8;}}
    .info-row{display:flex;gap:0.75rem;margin-bottom:1.5rem;}
    .info-box{flex:1;background:#0d0f1a;border:1px solid #1e2235;border-radius:12px;padding:0.85rem 0.75rem;text-align:center;}
    .info-label{font-family:'Space Mono',monospace;font-size:0.62rem;color:#4b5563;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.3rem;}
    .info-val{font-size:0.85rem;font-weight:700;color:#e2e8f0;}
    .info-val.green{color:#10b981;}.info-val.cyan{color:#00e5ff;}
    .countdown-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
    .countdown-ring{position:relative;width:64px;height:64px;}
    .ring-track{fill:none;stroke:#1e2235;stroke-width:4;}
    .ring-fill{fill:none;stroke:#00e5ff;stroke-width:4;stroke-linecap:round;stroke-dasharray:175.9;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}
    .countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:#00e5ff;}
    .redirect-box{background:#0d0f1a;border-left:3px solid #00e5ff;border-radius:0 10px 10px 0;padding:0.85rem 1.1rem;text-align:left;margin-bottom:1.25rem;}
    .redirect-box p{font-family:'Space Mono',monospace;font-size:0.75rem;color:#6b7280;line-height:1.7;}
    .redirect-box a{color:#00e5ff;text-decoration:underline;cursor:pointer;}
    .btn-go{width:100%;padding:0.9rem;border-radius:12px;background:linear-gradient(135deg,#00e5ff,#00b8cc);border:none;color:#0d0f1a;font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.75rem;}
    .btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,229,255,0.3);}
    .btn-signout{width:100%;padding:0.75rem;border-radius:12px;border:1px solid #1e2235;background:transparent;color:#6b7280;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    .btn-signout:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.06);}
    .footnote{position:relative;z-index:1;text-align:center;padding:1rem;font-family:'Space Mono',monospace;font-size:0.7rem;color:#374151;}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <div class="nav-ring"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" style="width:20px;height:20px;">
          <rect x="9" y="2" width="6" height="12" rx="3" fill="rgba(0,229,255,0.15)" stroke="#00e5ff"/>
          <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#00e5ff" fill="none"/>
          <line x1="12" y1="19" x2="12" y2="22" stroke="#00e5ff"/>
          <line x1="9" y1="22" x2="15" y2="22" stroke="#00e5ff"/>
        </svg>
      </div>
      <h1>Voice<span>Access</span></h1>
    </a>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="nav-badge"><span class="nav-dot"></span>AUTHENTICATED</div>
      <a href="/" class="btn-logout">Logout</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div class="icon-wrap">
        <div class="icon-ring1"></div><div class="icon-ring2"></div>
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="rgba(0,229,255,0.2)" stroke="#00e5ff"/>
            <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#00e5ff" fill="none"/>
            <line x1="12" y1="19" x2="12" y2="22" stroke="#00e5ff"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="#00e5ff"/>
          </svg>
        </div>
      </div>

      <div class="auth-badge"><span class="auth-dot"></span>VOICE AUTHENTICATED</div>
      <div class="welcome-label">Welcome back</div>
      <div class="username"><span id="uname">—</span></div>

      <div class="waveform">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      </div>

      <div class="info-row">
        <div class="info-box"><div class="info-label">Match Score</div><div class="info-val cyan" id="scoreVal">—</div></div>
        <div class="info-box"><div class="info-label">Model</div><div class="info-val green" id="modelVal">—</div></div>
      </div>

      <div class="countdown-wrap">
        <div class="countdown-ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="ring-track" cx="32" cy="32" r="28"/>
            <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="28"/>
          </svg>
          <div class="countdown-num" id="countNum">3</div>
        </div>
      </div>

      <div class="redirect-box">
        <p>Redirecting to <strong style="color:#00e5ff;">Call Analysis</strong> in <span id="countTxt">3</span>s… or <a id="goNow">go now →</a></p>
      </div>

      <button class="btn-go" id="goBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:18px;height:18px;">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        Open Call Analysis Now
      </button>
      <button class="btn-signout" onclick="window.location.href='/'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:15px;height:15px;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </main>
  <div class="footnote">Raw audio deleted after embedding extraction</div>

  <script>
    const p    = new URLSearchParams(window.location.search);
    const user = p.get('user') || 'User';
    document.getElementById('uname').textContent    = user;
    document.getElementById('scoreVal').textContent = !isNaN(parseFloat(p.get('score'))) ? (parseFloat(p.get('score'))*100).toFixed(1)+'%' : '—';
    document.getElementById('modelVal').textContent = (p.get('model')||'').includes('librosa') ? 'Librosa' : 'ECAPA-TDNN';

    const dest = '/call-analysis?user=' + encodeURIComponent(user);
    const circumference = 2 * Math.PI * 28;
    const ring = document.getElementById('ringFill');
    ring.style.strokeDasharray  = circumference;
    ring.style.strokeDashoffset = 0;

    let secs = 3;
    const timer = setInterval(() => {
      secs--;
      document.getElementById('countNum').textContent = secs;
      document.getElementById('countTxt').textContent = secs;
      ring.style.strokeDashoffset = circumference * (1 - secs / 3);
      if (secs <= 0) { clearInterval(timer); window.location.href = dest; }
    }, 1000);

    const go = () => { clearInterval(timer); window.location.href = dest; };
    document.getElementById('goNow').addEventListener('click', e => { e.preventDefault(); go(); });
    document.getElementById('goBtn').addEventListener('click', go);
  </script>
</body>
</html>
